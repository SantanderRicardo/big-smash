<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">

🍔 BIG SMASH 🍟

</a>

</div>

</nav>

<div class="container">

<h2 class="mb-4">

Productos

</h2>

<form id="formProducto">

<div class="row">

<div class="col-md-4">

<input
class="form-control"
id="nombre"
placeholder="Nombre"
required>

</div>

<div class="col-md-4">

<input
class="form-control"
id="descripcion"
placeholder="Descripción"
required>

</div>

<div class="col-md-2">

<input
type="number"
class="form-control"
id="precio"
placeholder="Precio"
required>

</div>

<div class="col-md-2">

<input
type="number"
class="form-control"
id="stock"
placeholder="Stock"
required>

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">
<!-- 
<input
class="form-control"
id="categoria"
placeholder="Categoría"
required> -->
<input
            type="text"
            id="buscarProducto"
            class="form-control"
            placeholder="🔍 Buscar producto...">
</div>

<div class="col-md-6">

<button class="btn btn-success w-100">

Guardar Producto

</button>

</div>

</div>

</form>

<hr>

<table class="table table-hover table-striped shadow">

<thead class="table-dark">

<tr>

<th>Nombre</th>

<th>Descripción</th>

<th>Precio</th>

<th>Categoría</th>

<th>Stock</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaProductos">

</tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/productos.js"></script>

</body>

</html>
