<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🍔 BIG SMASH
        </a>

    </div>

</nav>

<div class="container">

    <h2 class="mb-4">Clientes</h2>

    <form id="formCliente">

        <div class="row">

            <div class="col-md-4">
                <input class="form-control" id="nombre" placeholder="Nombre" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" id="apellido" placeholder="Apellido" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" id="telefono" placeholder="Teléfono" required>
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-6">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>

            <div class="col-md-6">
                <input class="form-control" id="direccion" placeholder="Dirección" required>
            </div>

        </div>

        <div class="mt-3">

            <button class="btn btn-success w-100">
                Guardar Cliente
            </button>

        </div>

    </form>

    <hr>

    <table class="table table-hover table-striped shadow">

        <thead class="table-dark">

            <tr>

                <th>Nombre</th>

                <th>Apellido</th>

                <th>Teléfono</th>

                <th>Email</th>

                <th>Dirección</th>

                <th>Acciones</th>

            </tr>

        </thead>

        <tbody id="tablaClientes">

        </tbody>

    </table>

</div>

<script src="js/clientes.js"></script>

</body>

</html>
