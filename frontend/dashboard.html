<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Big Smash</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="/">

🍔 BIG SMASH ADMIN

</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4">

Dashboard

</h2>

<div class="row">

<div class="col-md-3">

<div class="card shadow text-center p-4">

<i class="bi bi-box-seam display-3 text-primary"></i>

<h5 class="mt-3">

Productos

</h5>

<h1 id="cantProductos">0</h1>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center p-4">

<i class="bi bi-people display-3 text-success"></i>

<h5 class="mt-3">

Clientes

</h5>

<h1 id="cantClientes">0</h1>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center p-4">

<i class="bi bi-cart-check display-3 text-danger"></i>

<h5 class="mt-3">

Pedidos

</h5>

<h1 id="cantPedidos">0</h1>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center p-4">

<i class="bi bi-currency-dollar display-3 text-warning"></i>

<h5 class="mt-3">

Ventas

</h5>

<h1 id="ventas">$0</h1>

</div>

</div>

</div>

<hr class="my-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">

Resumen del sistema

</div>

<div class="card-body">

<ul class="list-group">

<li class="list-group-item">

✔ API REST funcionando

</li>

<li class="list-group-item">

✔ MongoDB conectado

</li>

<li class="list-group-item">

✔ Arquitectura MVC

</li>

<li class="list-group-item">

✔ CRUD Productos

</li>

<li class="list-group-item">

✔ CRUD Clientes

</li>

<li class="list-group-item">

✔ CRUD Pedidos

</li>

</ul>

</div>

</div>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
